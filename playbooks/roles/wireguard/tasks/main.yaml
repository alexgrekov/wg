---
- name: wireguard | install packages
  ansible.builtin.apt:
    pkg:
    - wireguard
    - nftables

- name: wireguard | setup sysctl
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: '1'
    sysctl_set: true

- name: wireguard | template config
  ansible.builtin.template:
    src: wg0.conf.j2
    dest: /etc/wireguard/wg0.conf
    owner: root
    group: root
    mode: '0600'

- name: wireguard | start and enable service
  ansible.builtin.systemd_service:
    name: wg-quick@wg0
    state: restarted
    enabled: true
  when: not ansible_check_mode

